<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 - Open Azitfh</title>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a id="navDash"   href="dashboard.html">내 공간</a>
      <a id="navLogin"  href="login.html">로그인</a>
      <a id="navLogout" href="#">로그아웃</a>
      <a id="navSignup" href="signup.html" class="nav-signup">회원가입</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="post-wrap">
    <a href="index.html" class="post-back">← 목록으로</a>

    <div id="postContent">
      <div class="post-detail-header">
        <span class="news-badge" id="postCategory"></span>
        <h1 class="post-detail-title" id="postTitle"></h1>
        <div class="post-detail-meta">
          <span>by <span id="postAuthor"></span></span>
          <span>·</span>
          <span id="postDate"></span>
          <span>·</span>
          <span>조회 <span id="postViews"></span></span>
        </div>
      </div>

      <div class="post-detail-body" id="postBody"></div>

      <!-- 영상 플레이어 -->
      <div id="videoPlaySection" class="hidden" style="margin:28px 0 0">
        <div class="video-play-wrap">
          <video id="videoPlayer" class="video-player"
                 controls preload="metadata" playsinline></video>
        </div>
      </div>

      <!-- 게임 플레이 -->
      <div id="gamePlaySection" class="hidden" style="margin:28px 0 0">
        <div class="game-play-wrap">
          <div class="game-play-header">
            <span class="game-play-title">🎮 게임 플레이</span>
            <button id="gameFullscreenBtn" type="button" class="btn-secondary"
                    style="font-size:12px;padding:5px 12px">전체화면</button>
          </div>
          <iframe id="gameFrame" class="game-iframe"
                  sandbox="allow-scripts allow-pointer-lock"
                  allow="fullscreen; pointer-lock"
                  referrerpolicy="no-referrer"></iframe>
        </div>
      </div>

      <!-- 추천 / 비추천 -->
      <div class="vote-section">
        <button id="voteUpBtn" class="vote-btn" disabled>👍 추천 <span id="voteUpCount">0</span></button>
        <button id="voteDownBtn" class="vote-btn" disabled>👎 비추천 <span id="voteDownCount">0</span></button>
      </div>

      <!-- 신고 / 삭제 -->
      <div class="post-actions">
        <button id="postReportBtn" class="post-report-btn hidden">신고</button>
        <button id="postDelBtn"    class="post-del-btn hidden">삭제</button>
      </div>
    </div>

    <!-- 댓글 -->
    <div class="comment-section">
      <h3 class="comment-title">댓글 <span id="commentCount">0</span>개</h3>
      <div id="commentList"></div>
      <form id="commentForm" class="comment-form hidden">
        <textarea id="commentInput" placeholder="댓글을 입력하세요" maxlength="500" rows="3"></textarea>
        <div class="comment-form-actions">
          <span id="commentCharCount">0/500</span>
          <button type="submit" class="btn btn-primary">등록</button>
        </div>
      </form>
      <p id="commentLoginMsg" class="comment-login-msg hidden">
        <a href="login.html">로그인</a>하면 댓글을 달 수 있어요.
      </p>
    </div>
  </div>

  <!-- 신고 모달 -->
  <div id="reportModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 class="modal-title">신고 사유 선택</h3>
      <div class="report-reasons">
        <label class="report-reason-item"><input type="radio" name="reportReason" value="스팸/광고"> 스팸/광고</label>
        <label class="report-reason-item"><input type="radio" name="reportReason" value="욕설/혐오 표현"> 욕설/혐오 표현</label>
        <label class="report-reason-item"><input type="radio" name="reportReason" value="불법 정보"> 불법 정보</label>
        <label class="report-reason-item"><input type="radio" name="reportReason" value="음란물"> 음란물</label>
        <label class="report-reason-item"><input type="radio" name="reportReason" value="기타" checked> 기타</label>
      </div>
      <div class="modal-actions">
        <button id="reportConfirmBtn" class="btn btn-primary">신고하기</button>
        <button id="reportCancelBtn"  class="btn-secondary" type="button">취소</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initPostDetail();</script>
</body>
</html>
