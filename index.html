<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Azitfh — 한국어 커뮤니티 플랫폼</title>
  <meta name="description" content="아지트를 만들고 게임·영상·코드·글을 올리며 교류하는 한국어 커뮤니티 플랫폼입니다.">
  <meta name="keywords" content="커뮤니티, 아지트, 웹게임, 코드 실행, 영상, 한국어">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Open Azitfh">
  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://aaa-000.vercel.app/">
  <meta property="og:title"       content="Open Azitfh — 한국어 커뮤니티 플랫폼">
  <meta property="og:description" content="아지트를 만들고 게임·영상·코드·글을 올리며 교류하는 커뮤니티 플랫폼">
  <meta property="og:locale"      content="ko_KR">
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Open Azitfh">
  <meta name="twitter:description" content="게임·영상·코드·글을 올리는 한국어 커뮤니티">
  <!-- AI / Crawlers -->
  <link rel="alternate" type="application/json" href="/api-docs.json" title="API Documentation">
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <!-- Schema.org WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Open Azitfh",
    "url": "https://aaa-000.vercel.app",
    "description": "한국어 커뮤니티 플랫폼. 아지트(공간)를 만들고 게임·영상·코드·글을 공유합니다.",
    "inLanguage": "ko",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://aaa-000.vercel.app/index.html",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html" class="active">홈</a>
      <a id="navDash"   href="dashboard.html">내 공간</a>
      <a id="navLogin"  href="login.html">로그인</a>
      <a id="navLogout" href="#">로그아웃</a>
      <a id="navSignup" href="signup.html" class="nav-signup">회원가입</a>
      <a id="navNotif" href="notifications.html" class="nav-notif hidden" title="알림">🔔<span id="notifBadge" class="notif-badge hidden">0</span></a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <!-- 공지사항 -->
  <section class="notice-section">
    <div class="notice-wrap">
      <div class="notice-header">
        <span class="notice-label">📢 공지사항</span>
        <button id="noticeAddBtn" class="notice-add-btn hidden">+ 추가</button>
      </div>
      <form id="noticeForm" class="notice-form hidden">
        <input type="text" id="noticeInput" placeholder="공지 내용을 입력하세요" maxlength="100">
        <button type="submit">등록</button>
      </form>
      <div class="notice-grid" id="noticeList"></div>
    </div>
  </section>

  <!-- 카테고리 -->
  <section class="cat-section">
    <div class="cat-section-wrap">
      <div class="cat-box">
        <div class="cat-top">
          <span class="cat-section-label">아지트</span>
          <input type="text" id="catSearch" class="cat-search" placeholder="아지트 검색">
          <button id="typeToggleBtn" class="azit-type-toggle-btn">타입 보기</button>
        </div>
        <div class="azit-type-filter" id="azitTypeFilter">
          <button class="azit-type-btn active" data-type="">전체</button>
        </div>
        <div class="cat-cards" id="catChips"></div>
      </div>
    </div>
  </section>

  <!-- 인기 게시물 -->
  <section class="news-section">
    <div class="section-header">
      <h2 class="section-title" id="postsSectionTitle">인기 게시물</h2>
      <a id="writeBtn" href="post-write.html" class="write-btn hidden">+ 글쓰기</a>
    </div>
    <div class="news-grid" id="newsGrid"></div>
  </section>

  <!-- 게시물 목록 -->
  <section class="posts-list-section">
    <div class="posts-list-wrap">
      <div class="section-header">
        <h2 class="section-title" id="postsListTitle">게시물</h2>
        <div class="posts-search-wrap">
          <input type="search" id="postsSearch" class="posts-search" placeholder="제목 검색..." autocomplete="off">
        </div>
      </div>
      <div class="posts-list" id="postsList"></div>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initIndex();</script>
</body>
</html>
