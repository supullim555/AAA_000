<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 공간 - Open Azitfh</title>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a href="dashboard.html" class="active">내 공간</a>
      <a id="navLogout" href="#">로그아웃</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="dash-wrap">
    <div class="welcome-banner">
      <h2>안녕하세요, <span id="userName"></span>님! 👋</h2>
      <p>
        가입일: <span id="joinDate"></span>
        &nbsp;·&nbsp;
        이메일: <span id="userEmail"></span>
      </p>
    </div>

    <!-- 글 작성 -->
    <div class="dash-section" style="display:flex;align-items:center;justify-content:space-between">
      <h3 class="dash-section-title" style="margin-bottom:0">게시물 작성</h3>
      <a href="post-write.html" class="btn btn-primary" style="font-size:13px;padding:9px 20px">+ 글쓰기</a>
    </div>

    <!-- 카테고리 관리 -->
    <div class="dash-section">
      <h3 class="dash-section-title">아지트 관리</h3>
      <div class="cat-add-row">
        <input type="text" id="catInput" placeholder="아지트 이름" maxlength="20">
        <button id="catAddBtn">추가</button>
      </div>
      <div class="cat-add-row" style="margin-top:-4px">
        <input type="text" id="catDescInput" placeholder="설명 (선택, 최대 60자)" maxlength="60" style="font-size:12px">
      </div>
      <div class="cat-add-row" style="margin-top:-4px">
        <select id="catTypeInput" style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;color:var(--text);background:var(--bg)">
          <option value="general">💬 커뮤니티</option>
          <option value="video">🎬 영상</option>
          <option value="game">🎮 게임</option>
          <option value="gallery">🖼️ 갤러리</option>
        </select>
      </div>
      <ul id="catList" class="cat-list"></ul>
    </div>

    <button id="logoutBtn" class="logout-btn">로그아웃</button>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initDashboard();</script>
</body>
</html>
