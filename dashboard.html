<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 공간 - Open Azitfh</title>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a href="dashboard.html" class="active">내 공간</a>
      <a id="navLogout" href="#">로그아웃</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="dash-wrap">
    <div class="welcome-banner">
      <h2>안녕하세요, <span id="userName"></span>님! 👋</h2>
      <p>
        가입일: <span id="joinDate"></span>
        &nbsp;·&nbsp;
        이메일: <span id="userEmail"></span>
      </p>
    </div>

    <!-- 글 작성 -->
    <div class="dash-section" style="display:flex;align-items:center;justify-content:space-between">
      <h3 class="dash-section-title" style="margin-bottom:0">게시물 작성</h3>
      <a href="post-write.html" class="btn btn-primary" style="font-size:13px;padding:9px 20px">+ 글쓰기</a>
    </div>

    <!-- 아지트 관리 -->
    <div class="dash-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 class="dash-section-title" style="margin-bottom:0">아지트 관리</h3>
        <a href="azit-create.html" class="btn btn-primary" style="font-size:13px;padding:7px 16px">+ 아지트 만들기</a>
      </div>
      <div class="azit-type-filter" id="dashTypeFilter">
        <button class="azit-type-btn active" data-type="">전체</button>
        <button class="azit-type-btn" data-type="general">기본</button>
      </div>
      <ul id="catList" class="cat-list"></ul>
    </div>

    <button id="logoutBtn" class="logout-btn">로그아웃</button>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initDashboard();</script>
</body>
</html>
