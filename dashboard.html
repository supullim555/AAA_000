<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 공간 - Open Azitfh</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo-img" href="index.html"><img src="logo.png" alt="Open Azitfh"></a>
    <nav>
      <a href="index.html">홈</a>
      <a href="dashboard.html" class="active">내 공간</a>
      <a id="navLogout" href="#">로그아웃</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="dash-wrap">
    <div class="welcome-banner">
      <h2>안녕하세요, <span id="userName"></span>님! 👋</h2>
      <p>
        가입일: <span id="joinDate"></span>
        &nbsp;·&nbsp;
        이메일: <span id="userEmail"></span>
      </p>
    </div>

    <!-- 카테고리 현황 -->
    <div class="dash-section">
      <h3 class="dash-section-title">카테고리</h3>
      <div class="cat-top" style="margin-bottom:10px;">
        <input type="text" id="dashCatSearch" class="cat-search" placeholder="카테고리 검색">
      </div>
      <div class="cat-chips" id="dashCatChips"></div>
    </div>

    <!-- 카테고리 관리 -->
    <div class="dash-section">
      <h3 class="dash-section-title">카테고리 관리</h3>
      <div class="cat-add-row">
        <input type="text" id="catInput" placeholder="새 카테고리 이름" maxlength="20">
        <button id="catAddBtn">추가</button>
      </div>
      <ul id="catList" class="cat-list"></ul>
    </div>

    <button id="logoutBtn" class="logout-btn">로그아웃</button>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initDashboard();</script>
</body>
</html>
