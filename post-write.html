<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 - Open Azitfh</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a href="dashboard.html">내 공간</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="post-write-wrap">
    <form id="postWriteForm" class="post-write-form">
      <h2>글쓰기</h2>

      <div class="field">
        <label for="category">카테고리</label>
        <select id="category" name="category"></select>
        <p class="hint hidden" id="catHint">
          카테고리가 없습니다. <a href="dashboard.html">내 공간</a>에서 먼저 추가해 주세요.
        </p>
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input type="text" id="title" name="title" placeholder="제목을 입력하세요" maxlength="80">
      </div>

      <div class="field">
        <label for="content">내용</label>
        <textarea id="content" name="content" placeholder="내용을 입력하세요"></textarea>
      </div>

      <div class="post-write-actions">
        <a href="index.html" class="btn-secondary">취소</a>
        <button type="submit" class="btn btn-primary">등록</button>
      </div>
    </form>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initPostWrite();</script>
</body>
</html>
