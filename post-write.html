<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 - Open Azitfh</title>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a href="dashboard.html">내 공간</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="post-write-wrap">
    <form id="postWriteForm" class="post-write-form">
      <h2>글쓰기</h2>

      <div class="field">
        <label for="category">아지트</label>
        <select id="category" name="category"></select>
        <p class="hint hidden" id="catHint">
          아지트가 없습니다. <a href="dashboard.html">내 공간</a>에서 먼저 추가해 주세요.
        </p>
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input type="text" id="title" name="title" placeholder="제목을 입력하세요" maxlength="80" autocomplete="off">
      </div>

      <div class="field">
        <label id="contentLabel">내용</label>

        <!-- 기본: Quill 리치 에디터 -->
        <div id="quillSection">
          <div id="quillToolbar">
            <span class="ql-formats">
              <select class="ql-font">
                <option selected>기본</option>
                <option value="serif">명조</option>
                <option value="monospace">코드</option>
              </select>
              <select class="ql-size">
                <option value="12px">12px</option>
                <option value="14px">14px</option>
                <option selected>16px</option>
                <option value="18px">18px</option>
                <option value="24px">24px</option>
                <option value="32px">32px</option>
              </select>
            </span>
            <span class="ql-formats">
              <button class="ql-bold"></button>
              <button class="ql-italic"></button>
              <button class="ql-underline"></button>
              <button class="ql-strike"></button>
            </span>
            <span class="ql-formats">
              <select class="ql-color"></select>
              <select class="ql-background"></select>
            </span>
            <span class="ql-formats">
              <select class="ql-align"></select>
            </span>
            <span class="ql-formats">
              <button class="ql-list" value="ordered"></button>
              <button class="ql-list" value="bullet"></button>
            </span>
            <span class="ql-formats">
              <button class="ql-image" title="이미지 / GIF 추가"></button>
              <button class="ql-link"></button>
            </span>
            <span class="ql-formats">
              <button id="attachBtn" type="button" class="ql-attach" title="첨부파일 추가">📎</button>
            </span>
            <span class="ql-formats">
              <button class="ql-clean"></button>
            </span>
          </div>
          <div id="quillEditor"></div>
        </div>

        <!-- 영상 타입 전용 양식 -->
        <div id="videoSection" class="hidden">
          <div class="game-write-form">
            <div class="field">
              <label>영상 설명</label>
              <textarea id="videoDesc" placeholder="영상을 소개해 주세요" maxlength="500"
                        style="min-height:100px"></textarea>
            </div>
            <div class="field">
              <label>영상 파일 <span style="font-size:11px;color:var(--text-light);font-weight:400">(MP4·WebM·MOV, 최대 200MB)</span></label>
              <input type="file" id="videoFileInput" accept="video/mp4,video/webm,video/quicktime,video/x-msvideo" style="display:none">
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                <button type="button" id="videoFileBtn" class="btn-secondary"
                        style="font-size:13px;padding:8px 16px;white-space:nowrap">🎬 영상 선택</button>
                <span id="videoFileInfo" style="font-size:13px;color:var(--text-light)">선택된 파일 없음</span>
              </div>
            </div>
            <div class="field">
              <label>썸네일 이미지 URL <span style="font-size:11px;color:var(--text-light);font-weight:400">(선택)</span></label>
              <input type="url" id="videoThumbnailUrl" placeholder="https://...">
            </div>
          </div>
        </div>

        <!-- 코드 타입 전용 양식 -->
        <div id="codeSection" class="hidden">
          <div class="game-write-form">
            <div class="field">
              <label>언어</label>
              <select id="codeLang">
                <optgroup label="🌐 브라우저 실행">
                  <option value="HTML">HTML</option>
                  <option value="JavaScript">JavaScript</option>
                  <option value="CSS">CSS</option>
                  <option value="혼합">혼합 (HTML + CSS + JS)</option>
                </optgroup>
                <optgroup label="⚙️ 서버 실행 (Judge0)">
                  <option value="Python">Python 3</option>
                  <option value="C">C (GCC)</option>
                  <option value="C++">C++ (GCC)</option>
                </optgroup>
              </select>
            </div>
            <div class="field">
              <label>코드</label>
              <textarea id="codeContent" class="code-editor"
                        placeholder="코드를 입력하세요..."
                        spellcheck="false"></textarea>
              <p class="hint">HTML·CSS·JavaScript를 작성하면 게시물에서 바로 실행할 수 있어요. Tab키로 들여쓰기.</p>
            </div>
          </div>
        </div>

        <!-- 게임 타입 전용 양식 -->
        <div id="gameSection" class="hidden">
          <div class="game-write-form">
            <div class="field">
              <label>게임 설명</label>
              <textarea id="gameDesc" placeholder="게임을 소개해 주세요" maxlength="1000"
                        style="min-height:120px"></textarea>
            </div>
            <div class="field">
              <label>장르</label>
              <select id="gameGenre">
                <option value="">선택 안 함</option>
                <option value="액션">액션</option>
                <option value="퍼즐">퍼즐</option>
                <option value="아케이드">아케이드</option>
                <option value="롤플레잉">롤플레잉</option>
                <option value="기타">기타</option>
              </select>
            </div>
            <div class="field">
              <label>썸네일 이미지 URL</label>
              <input type="url" id="thumbnailUrl" placeholder="https://...">
            </div>
            <div class="field">
              <label>게임 폴더 <span style="font-size:11px;color:var(--text-light);font-weight:400">(HTML5 웹게임)</span></label>
              <input type="file" id="gameFolderInput" webkitdirectory directory multiple style="display:none">
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                <button type="button" id="gameFolderBtn" class="btn-secondary"
                        style="font-size:13px;padding:8px 16px;white-space:nowrap">📁 폴더 선택</button>
                <span id="gameFolderInfo" style="font-size:13px;color:var(--text-light)">선택된 폴더 없음</span>
              </div>
              <p class="hint">HTML5 웹게임 폴더를 통째로 선택하세요. Godot·Unity·Phaser·직접 제작 모두 가능 — index.html이 포함되어야 합니다.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="post-write-actions">
        <a href="index.html" class="btn-secondary">취소</a>
        <button type="submit" class="btn btn-primary">등록</button>
      </div>
    </form>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initPostWrite();</script>
</body>
</html>
