<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 - Open Azitfh</title>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a href="dashboard.html">내 공간</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="post-write-wrap">
    <form id="postWriteForm" class="post-write-form">
      <h2>글쓰기</h2>

      <div class="field">
        <label for="category">아지트</label>
        <select id="category" name="category"></select>
        <p class="hint hidden" id="catHint">
          아지트가 없습니다. <a href="dashboard.html">내 공간</a>에서 먼저 추가해 주세요.
        </p>
      </div>

      <div class="field">
        <label for="title">제목</label>
        <input type="text" id="title" name="title" placeholder="제목을 입력하세요" maxlength="80" autocomplete="off">
      </div>

      <div class="field">
        <label>내용</label>

        <!-- 커스텀 툴바 -->
        <div id="quillToolbar">
          <span class="ql-formats">
            <select class="ql-font">
              <option selected>기본</option>
              <option value="serif">명조</option>
              <option value="monospace">코드</option>
            </select>
            <select class="ql-size">
              <option value="12px">12px</option>
              <option value="14px">14px</option>
              <option selected>16px</option>
              <option value="18px">18px</option>
              <option value="24px">24px</option>
              <option value="32px">32px</option>
            </select>
          </span>
          <span class="ql-formats">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-strike"></button>
          </span>
          <span class="ql-formats">
            <select class="ql-color"></select>
            <select class="ql-background"></select>
          </span>
          <span class="ql-formats">
            <select class="ql-align"></select>
          </span>
          <span class="ql-formats">
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-image" title="이미지 / GIF 추가"></button>
            <button class="ql-link"></button>
          </span>
          <span class="ql-formats">
            <button id="attachBtn" type="button" class="ql-attach" title="첨부파일 추가">📎</button>
          </span>
          <span class="ql-formats">
            <button class="ql-clean"></button>
          </span>
        </div>

        <!-- 에디터 본문 -->
        <div id="quillEditor"></div>
      </div>

      <div class="post-write-actions">
        <a href="index.html" class="btn-secondary">취소</a>
        <button type="submit" class="btn btn-primary">등록</button>
      </div>
    </form>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initPostWrite();</script>
</body>
</html>
