<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타입 만들기 - Open Azitfh</title>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a href="dashboard.html" class="active">내 공간</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="post-write-wrap">
    <form id="azitTypeCreateForm" class="post-write-form">
      <h2>타입 만들기</h2>
      <p style="font-size:13px;color:var(--text-light);margin:-10px 0 20px">
        타입은 아지트가 구동될 <strong>엔진</strong>입니다.<br>
        어떤 성격의 공간을 만들지 정의하면, 아지트가 그 엔진 위에서 작동합니다.
      </p>

      <div class="field">
        <label for="azitTypeLabel">타입 이름</label>
        <input type="text" id="azitTypeLabel" name="azitTypeLabel"
               placeholder="예: 스터디, 게임, 독서" maxlength="20" autocomplete="off">
        <p class="hint">아지트를 분류하는 고유한 이름입니다. 2자 이상 입력하세요.</p>
      </div>

      <div class="field">
        <label for="azitTypeDesc">엔진 설명</label>
        <textarea id="azitTypeDesc" name="azitTypeDesc"
                  placeholder="이 타입의 아지트에서는 어떤 활동이 이루어지나요?"
                  maxlength="120" style="min-height:80px"></textarea>
      </div>

      <div style="display:flex;gap:16px">
        <div class="field" style="flex:0 0 80px">
          <label for="azitTypeIcon">기본 아이콘</label>
          <input type="text" id="azitTypeIcon" name="azitTypeIcon"
                 value="🏠" maxlength="4"
                 style="font-size:24px;text-align:center;padding:8px">
        </div>
        <div class="field" style="flex:1">
          <label for="azitTypeColor">기본 색상</label>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="color" id="azitTypeColor" name="azitTypeColor"
                   value="#4aab8e"
                   style="width:48px;height:42px;padding:2px;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;background:none">
            <span id="azitTypeColorHex" style="font-size:13px;color:var(--text-light);font-family:monospace">#4aab8e</span>
          </div>
          <p class="hint">아지트 히어로 배너의 기본 색상으로 사용됩니다.</p>
        </div>
      </div>

      <!-- 미리보기 -->
      <div id="typePreview" style="border-radius:var(--r);overflow:hidden;margin-bottom:18px">
        <div id="typePreviewBanner"
             style="padding:20px 22px;background:linear-gradient(135deg,#4aab8e,#2d7a62);color:#fff">
          <span id="typePreviewIcon" style="font-size:32px;display:block;margin-bottom:8px">🏠</span>
          <div id="typePreviewName" style="font-size:18px;font-weight:800">타입 이름</div>
          <div id="typePreviewDesc" style="font-size:12px;opacity:.85;margin-top:4px">엔진 설명</div>
        </div>
      </div>

      <div class="post-write-actions">
        <a href="dashboard.html" class="btn-secondary">취소</a>
        <button type="submit" class="btn btn-primary">엔진 등록</button>
      </div>
    </form>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initAzitTypeCreate();</script>
</body>
</html>
