<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아지트 - Open Azitfh</title>
  <meta name="description" content="Open Azitfh 아지트 상세 페이지">
  <meta name="robots" content="index, follow">
  <meta property="og:type"   content="website">
  <meta property="og:locale" content="ko_KR">
  <meta id="ogTitle"       property="og:title"       content="아지트 — Open Azitfh">
  <meta id="ogDescription" property="og:description" content="Open Azitfh 아지트">
  <meta id="metaDescription" name="description"      content="Open Azitfh 아지트">
  <link rel="alternate" type="application/json" href="/api-docs.json" title="API Documentation">
  <script type="application/ld+json" id="azitSchema">{"@context":"https://schema.org","@type":"WebPage"}</script>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <a href="index.html">홈</a>
      <a id="navDash"   href="dashboard.html">내 공간</a>
      <a id="navLogin"  href="login.html">로그인</a>
      <a id="navMsg"    href="messages.html" class="hidden nav-msg-btn"><span class="nav-msg-icon">✉</span> 메시지<span id="msgBadge" class="notif-badge hidden"></span></a>
      <a id="navLogout" href="#">로그아웃</a>
      <a id="navSignup" href="signup.html" class="nav-signup">회원가입</a>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <!-- ── 히어로 배너 ── -->
  <div class="azitfh-hero">
    <div class="azitfh-hero-bg" id="heroBg"></div>
    <div class="azitfh-hero-content">
      <span class="azitfh-icon" id="heroIcon">🏠</span>
      <h1 class="azitfh-name" id="heroName">아지트</h1>
      <p class="azitfh-desc" id="heroDesc"></p>
      <div class="azitfh-stats">
        <span>📝 <strong id="heroPostCount">0</strong>개의 게시물</span>
        <span>👤 <strong id="heroMemberCount">0</strong>명의 멤버</span>
      </div>
      <div class="azitfh-actions">
        <span id="heroTypeBadge" class="azitfh-type-badge hidden"></span>
        <a id="heroEditBtn"  href="#" class="btn-secondary hidden" style="font-size:13px;padding:7px 14px">✏️ 편집</a>
        <a id="heroWriteBtn" href="#" class="btn btn-primary hidden">+ 글쓰기</a>
      </div>
    </div>
  </div>

  <!-- ── 탭 바 ── -->
  <div class="azitfh-tabs-wrap">
    <div class="azitfh-tabs">
      <button class="azitfh-tab active" data-tab="posts">게시물</button>
      <button class="azitfh-tab"        data-tab="about">정보</button>
    </div>
  </div>

  <!-- ── 콘텐츠 패널 ── -->
  <div class="azitfh-content-wrap">
    <div id="pane-posts" class="azitfh-pane">
      <div id="postsPane"></div>
    </div>
    <div id="pane-about" class="azitfh-pane hidden">
      <div id="aboutPane"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script src="app.js"></script>
  <script src="azitfh.js"></script>
  <script>initDarkMode(); initAzitfh();</script>
</body>
</html>
