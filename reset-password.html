<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 - Open Azitfh</title>
  <script>if(localStorage.getItem("jnaver_theme")!=="light")document.documentElement.setAttribute("data-theme","dark");</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Open <span>Azitfh</span></a>
    <nav>
      <button id="themeToggle" class="theme-toggle">🌙</button>
    </nav>
  </header>

  <div class="auth-wrap">
    <div class="auth-box">
      <h2>새 비밀번호 설정</h2>

      <!-- 링크 확인 중 -->
      <div id="resetWaiting" style="text-align:center;padding:24px 0">
        <p style="font-size:14px;color:var(--text-light)">링크를 확인하는 중이에요…</p>
      </div>

      <!-- 비밀번호 입력 폼 -->
      <form id="resetPasswordForm" class="hidden" style="margin-top:8px">
        <div class="field">
          <label>새 비밀번호</label>
          <input type="password" name="password" placeholder="8자 이상" autocomplete="new-password">
          <p class="error-msg" id="err-pw"></p>
        </div>
        <div class="field">
          <label>비밀번호 확인</label>
          <input type="password" name="passwordCheck" placeholder="비밀번호를 다시 입력" autocomplete="new-password">
          <p class="error-msg" id="err-pwcheck"></p>
        </div>
        <p class="global-error" id="err-reset"></p>
        <button type="submit" class="btn btn-primary btn-full" data-label="비밀번호 변경">비밀번호 변경</button>
      </form>

      <!-- 링크 만료 -->
      <div id="resetInvalid" class="hidden" style="text-align:center;padding:24px 0">
        <p style="font-size:32px">⚠️</p>
        <p style="font-size:15px;font-weight:700;margin-top:10px">링크가 만료됐어요.</p>
        <p style="font-size:13px;color:var(--text-light);margin-top:6px">재설정 링크는 1시간만 유효해요.</p>
        <a href="forgot.html" class="btn btn-outline btn-full" style="display:block;margin-top:16px">다시 시도하기</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script src="app.js"></script>
  <script>initDarkMode(); initResetPassword();</script>
</body>
</html>
